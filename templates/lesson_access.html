{% extends "base.html" %}
{% block content %}
<section class="product-detail">
  <div class="product-detail-header">
    <a class="back-button" href="{{ url_for('courses.course_detail', slug=course.slug) }}">Back to course</a>
    <div class="product-detail-category">{{ course.category }}</div>
    <h2 class="product-detail-name">{{ lesson.title }}</h2>
  </div>
  <div class="product-detail-content">
    <div class="product-detail-info">
      <div class="product-detail-section">
        <h3>Access required</h3>
        <p class="product-detail-description">Enter your access code to unlock this lesson.</p>
      </div>
      <div class="product-detail-section">
        <dialog open>
          <form method="post">
            <label for="access-code">Access Code (hex)</label>
            <input id="access-code" name="access_code" pattern="[0-9a-fA-F]{6,64}" title="Enter a hexadecimal code" required>
            {% if error_message %}
            <p class="product-detail-description">{{ error_message }}</p>
            {% endif %}
            <button class="btn-add-cart" type="submit">ACCESS</button>
          </form>
        </dialog>
      </div>
    </div>
    <div class="product-detail-image-container">
      <div class="product-detail-image-placeholder">
        <div class="product-detail-description">ACCESS KEY</div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
