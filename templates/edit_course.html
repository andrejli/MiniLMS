{% extends "base.html" %}

{% block title %}Edit Course - MiniLMS{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Edit Course</h1>

    <form method="POST" class="form">
        <div class="form-group">
            <label for="title">Course Title</label>
            <input type="text" id="title" name="title" required class="form-control" value="{{ course.title }}">
        </div>

        <div class="form-group">
            <label for="description">Course Description</label>
            <textarea id="description" name="description" required class="form-control" rows="3">{{ course.description }}</textarea>
        </div>

        <div class="form-group">
            <label for="content">Course Content</label>
            <textarea id="content" name="content" required class="form-control" rows="10">{{ course.content }}</textarea>
            <small>You can use HTML for formatting</small>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Course</button>
            <a href="{{ url_for('admin') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
