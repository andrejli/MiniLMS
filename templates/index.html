{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h2>Course Catalog</h2>
  <p>Select a course to start learning.</p>
</section>
<section class="products">
  <h2>Courses</h2>
  <div class="products-grid">
    {% for course in courses %}
    <a class="product-card" style="text-decoration:none;color:inherit;display:block;" href="{{ url_for('courses.course_detail', slug=course.slug) }}">
      <div class="product-category">{{ course.category }}</div>
      <h3 class="product-name">{{ course.title }}</h3>
      <p class="product-description">{{ course.summary }}</p>
      <div class="product-stock">Level: {{ course.level }}</div>
    </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
