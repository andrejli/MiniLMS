{% extends "base.html" %}

{% block title %}Create Course - MiniLMS{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Create New Course</h1>

    <form method="POST" class="form">
        <div class="form-group">
            <label for="title">Course Title</label>
            <input type="text" id="title" name="title" required class="form-control" placeholder="Introduction to Python">
        </div>

        <div class="form-group">
            <label for="description">Course Description</label>
            <textarea id="description" name="description" required class="form-control" rows="3" placeholder="A brief description of what students will learn..."></textarea>
        </div>

        <div class="form-group">
            <label for="content">Course Content</label>
            <textarea id="content" name="content" required class="form-control" rows="10" placeholder="Full course content, lessons, materials, etc..."></textarea>
            <small>You can use HTML for formatting</small>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Course</button>
            <a href="{{ url_for('admin') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
