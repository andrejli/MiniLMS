{% extends "base.html" %}

{% block title %}Enter Access Code - {{ course.title }}{% endblock %}

{% block content %}
<div class="access-page">
    <div class="access-card">
        <h1>Access Course</h1>
        <h2>{{ course.title }}</h2>
        <p>Please enter your access code to view this course.</p>

        <form method="POST" class="form">
            <div class="form-group">
                <label for="code">Access Code</label>
                <input type="text" id="code" name="code" required class="form-control" placeholder="Enter your 12-character code">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Access Course</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="request-access">
            <p>Don't have an access code?</p>
            <a href="{{ url_for('request_access', course_id=course.id) }}" class="btn btn-outline">Request Access Code</a>
        </div>
    </div>
</div>
{% endblock %}
