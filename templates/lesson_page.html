{% extends "base.html" %}
{% block content %}
<section class="product-detail">
  <div class="product-detail-header">
    <a class="back-button" href="{{ back_link }}">{{ back_label }}</a>
    <div class="product-detail-category">{{ entry.course_title }}</div>
    <h2 class="product-detail-name">{{ entry.lesson_title }}</h2>
  </div>
  <div class="product-detail-content">
    <div class="product-detail-info">
      <div class="product-detail-section">
        <h3>Lesson unlocked</h3>
        {% if content_html %}
        <div class="product-detail-description">{{ content_html }}</div>
        {% else %}
        <p class="product-detail-description">Content is not available yet.</p>
        {% endif %}
      </div>
    </div>
    <div class="product-detail-image-container">
      <div class="product-detail-image-placeholder">
        <div class="product-detail-description">ACCESS GRANTED</div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
